<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal Showdown - React + SignalR</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
            background: #020617;
            color: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(168, 85, 247, 0.22), transparent 28%),
                #020617;
        }

        button,
        input {
            font: inherit;
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.25rem 3rem;
        }

        .grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        }

        .card {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.28);
            backdrop-filter: blur(16px);
        }

        .hero {
            display: grid;
            gap: 1rem;
            grid-template-columns: minmax(0, 1.5fr) minmax(280px, 1fr);
            align-items: start;
        }

        .hero h1,
        .question-card h2,
        .card h2 {
            margin: 0;
        }

        .eyebrow,
        .category,
        .phase-pill,
        .winner-pill,
        .pill {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            border-radius: 999px;
            padding: .3rem .7rem;
            font-size: .85rem;
            font-weight: 700;
        }

        .eyebrow,
        .phase-pill {
            background: rgba(14, 165, 233, 0.16);
            color: #7dd3fc;
        }

        .winner-pill {
            background: rgba(250, 204, 21, 0.16);
            color: #fde68a;
        }

        .lead {
            max-width: 40rem;
            color: #cbd5e1;
        }

        .status {
            margin-bottom: .35rem;
            font-weight: 600;
        }

        .muted {
            color: #94a3b8;
        }

        .error {
            color: #fda4af;
            margin: 0;
        }

        .hero-stats {
            display: grid;
            gap: .75rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 16px;
            padding: .9rem 1rem;
            display: flex;
            flex-direction: column;
            gap: .35rem;
        }

        .controls-grid {
            display: grid;
            gap: .75rem;
            grid-template-columns: minmax(220px, 1.4fr) repeat(4, minmax(120px, 1fr));
        }

        input {
            border: 1px solid #334155;
            border-radius: 12px;
            background: #020617;
            color: #f8fafc;
            padding: .8rem .9rem;
            width: 100%;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: .8rem .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s ease, opacity .15s ease, background .15s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .primary {
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            color: #022c22;
        }

        .secondary {
            background: rgba(56, 189, 248, 0.18);
            color: #bae6fd;
        }

        .ghost {
            background: rgba(100, 116, 139, 0.22);
            color: #e2e8f0;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .answers {
            display: grid;
            gap: .75rem;
            margin-top: 1rem;
        }

        .answer {
            background: rgba(30, 41, 59, 0.85);
            color: #f8fafc;
            text-align: left;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .answer.reveal.correct {
            background: rgba(34, 197, 94, 0.18);
            color: #bbf7d0;
            border-color: rgba(34, 197, 94, 0.45);
        }

        .question-card {
            min-height: 320px;
        }

        .explanation,
        .empty-state {
            margin-top: 1rem;
            color: #cbd5e1;
        }

        .results-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: .75rem;
        }

        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: .75rem;
            border-radius: 14px;
            padding: .85rem 1rem;
            background: rgba(30, 41, 59, 0.68);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        .result-item.correct {
            border-color: rgba(34, 197, 94, 0.35);
        }

        .result-copy {
            display: flex;
            flex-direction: column;
            gap: .25rem;
        }

        .pill {
            min-width: 56px;
            justify-content: center;
        }

        .pill.success {
            background: rgba(34, 197, 94, 0.18);
            color: #bbf7d0;
        }

        .pill.neutral {
            background: rgba(100, 116, 139, 0.22);
            color: #cbd5e1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: .7rem 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
        }

        th {
            color: #94a3b8;
            font-size: .85rem;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .empty-row {
            color: #94a3b8;
        }

        @media (max-width: 900px) {
            .hero,
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="lib/react.production.min.js"></script>
<script src="lib/react-dom.production.min.js"></script>
<script src="lib/signalr.min.js"></script>
<script src="app.js"></script>
</body>
</html>
